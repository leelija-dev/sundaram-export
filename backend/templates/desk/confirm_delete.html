{% extends "desk/base.html" %}
{% block content %}
<div class="se-form-page">
  <div class="se-card se-card-pad se-delete-card">
    <h2 class="se-section-title se-heading-block">Confirm deletion</h2>
    <p>Are you sure you want to delete <strong>{{ object }}</strong>? This cannot be undone.</p>
    <form method="post" class="se-form-actions se-form-actions-flush">
      {% csrf_token %}
      <a href="{{ cancel_url }}" class="se-btn se-btn-secondary">Cancel</a>
      <button type="submit" class="se-btn se-btn-danger">Delete</button>
    </form>
  </div>
</div>
{% endblock %}
