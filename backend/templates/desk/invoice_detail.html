{% extends "desk/base.html" %}
{% load static %}
{% block extra_css %}
<link rel="stylesheet" href="{% static 'desk/invoice.css' %}?v=11">
{% endblock %}
{% block content %}
<div class="se-page-toolbar se-page-toolbar--start">
  <div class="se-page-toolbar__left">
    <a href="{% url 'desk:invoice_list' %}" class="se-btn se-btn-secondary">← All invoices</a>
  </div>
  <div class="se-page-toolbar__right">
    <a href="{% url 'desk:invoice_print' invoice.pk %}" class="se-btn se-btn-secondary">Print / PDF</a>
    <a href="{% url 'desk:invoice_edit' invoice.pk %}" class="se-btn se-btn-primary">Edit</a>
  </div>
</div>

<div class="se-invoice-preview-wrap">
  {% include "desk/includes/invoice_document.html" with show_status=True invoice_qr=invoice_qr %}
</div>
{% endblock %}
