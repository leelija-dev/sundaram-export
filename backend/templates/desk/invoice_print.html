{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Invoice {{ invoice.invoice_number }} | {{ setting.COMPANY_NAME }}</title>
  <link rel="stylesheet" href="{% static 'desk/invoice.css' %}?v=11">
</head>
<body class="se-invoice-print-body">
  <div class="se-invoice-print-page">
    <div class="se-invoice-print-toolbar">
      <div class="se-invoice-print-toolbar__left">
        {% if not public_verify %}
        <a href="{% url 'desk:invoice_detail' invoice.pk %}" class="se-invoice-print-btn se-invoice-print-btn--secondary">← Back to invoice</a>
        {% endif %}
      </div>
      <div class="se-invoice-print-toolbar__right">
        <button type="button" class="se-invoice-print-btn se-invoice-print-btn--primary" onclick="window.print()">Print invoice</button>
      </div>
    </div>
    <div class="se-invoice-print-shell">
      {% include "desk/includes/invoice_document.html" with show_status=True invoice_qr=invoice_qr %}
    </div>
  </div>
</body>
</html>
