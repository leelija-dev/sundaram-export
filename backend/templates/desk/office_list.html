{% extends "desk/base.html" %}
{% block content %}
<div class="se-page-toolbar">
  <a href="{% url 'desk:office_add' %}" class="se-btn se-btn-primary">+ Add office</a>
</div>
<div class="se-card">
  <div class="se-table-wrap">
    <table class="se-table se-table-cards">
      <thead>
        <tr><th>Region</th><th>Email</th><th>Phone</th><th>Actions</th></tr>
      </thead>
      <tbody>
        {% for item in items %}
        <tr>
          <td data-label="Region"><strong>{{ item.region }}</strong></td>
          <td data-label="Email">{{ item.email }}</td>
          <td data-label="Phone">{{ item.phone }}</td>
          <td data-label="Actions">
            <div class="se-actions">
              <a href="{% url 'desk:office_edit' item.pk %}" class="se-btn se-btn-sm se-btn-secondary">Edit</a>
              <a href="{% url 'desk:office_delete' item.pk %}" class="se-btn se-btn-sm se-btn-secondary">Delete</a>
            </div>
          </td>
        </tr>
        {% empty %}
        <tr><td colspan="4" class="se-empty">No offices yet.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
