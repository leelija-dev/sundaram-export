{% extends "desk/base.html" %}
{% load static %}
{% block extra_css %}
<link rel="stylesheet" href="{% static 'desk/report.css' %}?v=12">
{% endblock %}
{% block content %}
<div class="se-report-detail-layout">
  <div class="se-page-toolbar se-page-toolbar--start">
    <div class="se-page-toolbar__left">
      <a href="{% url 'desk:report_list' %}" class="se-btn se-btn-secondary">← All reports</a>
    </div>
    <div class="se-page-toolbar__right">
      <button type="button" class="se-btn se-btn-primary" onclick="window.print()">Print / PDF</button>
      <a href="{% url 'desk:report_delete' report.pk %}" class="se-btn se-btn-secondary">Delete</a>
    </div>
  </div>

  <div class="se-report-preview-wrap">
    {% include "desk/includes/report_document.html" %}
  </div>
</div>
{% endblock %}
