services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sundaram_export}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-strong-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-sundaram_export}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      USE_POSTGRES: "True"
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_SITE_URL:-http://localhost}/api/v1
        NEXT_PUBLIC_MEDIA_ORIGIN: ${PUBLIC_SITE_URL:-http://localhost}
        NEXT_PUBLIC_SITE_EMAIL: ${NEXT_PUBLIC_SITE_EMAIL:-exports@sundaramexport.com}
        NEXT_PUBLIC_SITE_PHONE: ${NEXT_PUBLIC_SITE_PHONE:-+91 22 4000 1200}
        NEXT_PUBLIC_SITE_PHONE_ALT: ${NEXT_PUBLIC_SITE_PHONE_ALT:-+1 (713) 555 0142}
        NEXT_PUBLIC_SITE_ADDRESS: ${NEXT_PUBLIC_SITE_ADDRESS:-Sundaram Trade Tower, Bandra Kurla Complex, Mumbai 400051, India}
        NEXT_PUBLIC_SITE_ADDRESS_SHORT: ${NEXT_PUBLIC_SITE_ADDRESS_SHORT:-Mumbai, India}
        NEXT_PUBLIC_SITE_ADDRESS_US: ${NEXT_PUBLIC_SITE_ADDRESS_US:-2400 Port Commerce Parkway, Houston, TX 77029, USA}
        NEXT_PUBLIC_SITE_FOUNDED_YEAR: ${NEXT_PUBLIC_SITE_FOUNDED_YEAR:-1998}
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      API_INTERNAL_URL: http://backend:8000/api/v1
      NEXT_PUBLIC_API_URL: ${PUBLIC_SITE_URL:-http://localhost}/api/v1
      NEXT_PUBLIC_MEDIA_ORIGIN: ${PUBLIC_SITE_URL:-http://localhost}
      NEXT_PUBLIC_SITE_EMAIL: ${NEXT_PUBLIC_SITE_EMAIL:-exports@sundaramexport.com}
      NEXT_PUBLIC_SITE_PHONE: ${NEXT_PUBLIC_SITE_PHONE:-+91 22 4000 1200}
      NEXT_PUBLIC_SITE_PHONE_ALT: ${NEXT_PUBLIC_SITE_PHONE_ALT:-+1 (713) 555 0142}
      NEXT_PUBLIC_SITE_ADDRESS: ${NEXT_PUBLIC_SITE_ADDRESS:-Sundaram Trade Tower, Bandra Kurla Complex, Mumbai 400051, India}
      NEXT_PUBLIC_SITE_ADDRESS_SHORT: ${NEXT_PUBLIC_SITE_ADDRESS_SHORT:-Mumbai, India}
      NEXT_PUBLIC_SITE_ADDRESS_US: ${NEXT_PUBLIC_SITE_ADDRESS_US:-2400 Port Commerce Parkway, Houston, TX 77029, USA}
      NEXT_PUBLIC_SITE_FOUNDED_YEAR: ${NEXT_PUBLIC_SITE_FOUNDED_YEAR:-1998}
    depends_on:
      - backend
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - media_data:/var/www/media:ro
      - static_data:/var/www/staticfiles:ro

volumes:
  postgres_data:
  media_data:
  static_data:
